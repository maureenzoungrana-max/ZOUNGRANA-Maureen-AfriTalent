<div class="haut"><h1>Remplissez le formulaire suivant</h1></div>
    <div ><h3> Veuillez complétez toutes les informations ci-dessous</h3></div>
    <div>
      <form action="">
            <div>
              <label for="nom">Nom:</label>
              <input type="text" id="nom" name="nom">
          </div>
          <div>
              <label for="prenom">Prénom:</label>
              <input type="text" id="prenom" name="prenom">
          </div>
          <div>
              <label for="mail">E-mail:</label>
              <input type="email" id="" name="">
          </div>
          <div>
              <label for="">Numéro de telephone:</label>
              <input type="tel" id="telephone" name="telephone" placeholder="+221 77 002 23 26">
          </div>
          <div><label for="age">Age:</label>
              <input type="number" id="age" name="age">
          </div>
          <div><label for="address">Addresse:</label>
              <input type="address" id="address" name="address">
          </div>
          <div>
            <label for="subject">Sujet:</label>
            <select name="sujet" id="sujet">
            <option value="">Demande de services</option>
            <option value="">Recrutement de freelances</option>
            <option value="">Proposition de projet(s)</option>
            <option value="">Demande d'informations</option>
            <option value="">Autres</option>
            </select>

          </div>
        <div>
          <label for="message">Message:</label>
          <input type="textarea">
        </div>
        <div>
            <input type="submit">
            <button type="submit">valider</button>
        </div>
      </form>
    </div>
